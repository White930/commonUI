<!-- ═══════════════════ SETTINGS PANEL ════════════ -->
<div id="settings-overlay">
  <div id="settings-panel">

    <div class="sp-title-bar">
      <span>Settings</span>
      <button class="sp-close" id="sp-close">✕</button>
    </div>

    <div class="sp-section">
      <div class="sp-section-label">Spin Animation</div>
      <div class="sp-speed-selector">
        <img src="images/UI_SPEED_SELECTOR.png" class="sp-speed-bg" alt="">
        <button class="sp-speed-zone" data-spd="normal"><img src="images/UI_SPEED_SELECTOR_NORMAL.png" alt=""></button>
        <button class="sp-speed-zone" data-spd="fast"><img src="images/UI_SPEED_SELECTOR_FAST.png" alt=""></button>
        <button class="sp-speed-zone" data-spd="turbo"><img src="images/UI_SPEED_SELECTOR_TURBO.png" alt=""></button>
      </div>
    </div>

    <div class="sp-section">
      <div class="sp-toggle-row">
        <span class="sp-toggle-label">Sound Effect</span>
        <div class="sp-toggle-track" id="sp-sfx-toggle">
          <div class="sp-toggle-thumb"></div>
        </div>
      </div>
      <div class="sp-toggle-row">
        <span class="sp-toggle-label">Music</span>
        <div class="sp-toggle-track on" id="sp-music-toggle">
          <div class="sp-toggle-thumb"></div>
        </div>
      </div>
    </div>

    <div class="sp-icon-row">
      <button class="sp-icon-btn" id="sp-history">
        <img src="images/SETTINGS_ACTION_HISTORY_ICON.png" alt="History">
        <span>History</span>
      </button>
      <button class="sp-icon-btn" id="sp-fullscreen">
        <img src="images/SETTINGS_ACTION_FULLSCREEN_ICON.png" alt="Full Screen">
        <span>Full Screen</span>
      </button>
      <button class="sp-icon-btn" id="sp-howtoplay">
        <img src="images/SETTINGS_ACTION_HOWTOPLAY_ICON.png" alt="How to Play">
        <span>How to Play</span>
      </button>
      <button class="sp-icon-btn" id="sp-favorite">
        <img src="images/FAVORITE.png" alt="Favorite" id="sp-favorite-img">
        <span>Favorite</span>
      </button>
    </div>

  </div>
</div>
